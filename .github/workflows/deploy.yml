# Deploy using GitHub secret AZURE_FUNCTIONAPP_PUBLISH_PROFILE (full publishData XML).
#
# Do NOT pass scm-do-build-during-deployment or enable-oryx-build here: with publish-profile
# auth, the action would PATCH Kudu app settings and can get HTTP 405 before zip upload.
#
# Before deploy works reliably with ZipDeploy + publish profile:
#   Portal → Function App → Configuration → General settings
#   → "SCM Basic Auth Publishing Credentials" = On → Save
#
# Secret: entire <publishData>...</publishData> from Overview → Get publish profile

name: Deploy Python API to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-functions-deploy
  cancel-in-progress: true

env:
  # Must match the Function App *resource name* in Azure Portal (same app you used for the publish profile).
  # Example: if Overview shows "diet-api", use diet-api; if it shows "diet-function-123", use that instead.
  AZURE_FUNCTIONAPP_NAME: diet-api
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into .python_packages
        run: |
          set -e
          python -m pip install --upgrade pip wheel
          mkdir -p .python_packages/lib/site-packages
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Deploy to Azure Functions (publish profile)
        uses: Azure/functions-action@v1.5.1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: "."
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
