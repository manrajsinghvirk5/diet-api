# Deploy: build zip, then async Kudu ZipDeploy (?isAsync=true) + poll — avoids HTTP 502 on large sync uploads.
# (Removed duplicate webapps-deploy step and invalid sku / remote-build — not supported by that action.)
#
# Secret: AZURE_FUNCTIONAPP_PUBLISH_PROFILE = full <publishData>...</publishData>
# Portal: SCM Basic Auth Publishing Credentials = On, then re-download publish profile.

name: Deploy Python API to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-functions-deploy
  cancel-in-progress: true

env:
  AZURE_FUNCTIONAPP_NAME: diet-api
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify layout and syntax
        run: |
          set -euo pipefail
          test -f host.json || { echo "::error::host.json missing at repo root"; exit 1; }
          test -f function_app.py || { echo "::error::function_app.py missing"; exit 1; }
          python -m compileall -q function_app.py shared

      - name: Install dependencies into .python_packages
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip wheel
          mkdir -p .python_packages/lib/site-packages
          PIP_DISABLE_PIP_VERSION_CHECK=1 \
            pip install --no-cache-dir -r requirements.txt \
            --target=".python_packages/lib/site-packages"

      - name: Create deployment zip
        run: |
          set -euo pipefail
          rm -f /tmp/functionapp.zip
          zip -rq /tmp/functionapp.zip . \
            -x '.git/*' \
            -x '.github/*' \
            -x '*__pycache__*' \
            -x '*.pyc' \
            -x '.venv/*' \
            -x 'venv/*' \
            -x 'local.settings.json' \
            -x '__blobstorage__/*' \
            -x '__queuestorage__/*' \
            -x '__azurite_db*'
          echo "Zip size (bytes):" && wc -c </tmp/functionapp.zip

      - name: ZipDeploy to Kudu (publish profile)
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          ZIP_PATH: /tmp/functionapp.zip
        run: |
          set -euo pipefail
          python3 "${GITHUB_WORKSPACE}/.github/scripts/kudu_zipdeploy.py"
