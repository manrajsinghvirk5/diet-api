name: Deploy Python API to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-functions-deploy
  cancel-in-progress: true

env:
  # STEP: Paste the EXACT name from the "All Resources" Name column here
  AZURE_FUNCTIONAPP_NAME: diet-api-hfegcjavhcamckcc 
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Zip for Deployment
        # This bypasses the "415 Unsupported Media Type" error
        run: zip -r release.zip . -x "*.git*"

      - name: The Bypass — Deploy Zip
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: 'release.zip'