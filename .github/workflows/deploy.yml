# Deploy using GitHub secret AZURE_FUNCTIONAPP_PUBLISH_PROFILE (full publishData XML).
#
# Before deploy works reliably with ZipDeploy + publish profile:
#   Portal → your Function App → Configuration → General settings
#   → "SCM Basic Auth Publishing Credentials" = On → Save
#   (Fixes common HTTP 405 on Kudu app-setting updates and HTTP 404 on zipdeploy.)
#
# Secret: paste the entire <publishData>...</publishData> document from
#   Function App → Overview → Get publish profile
# into GitHub → Settings → Secrets → AZURE_FUNCTIONAPP_PUBLISH_PROFILE

name: Deploy Python API to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-functions-deploy
  cancel-in-progress: true

env:
  # Must match the Function App name in Azure (see publish profile msdeploySite).
  AZURE_FUNCTIONAPP_NAME: diet-api
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into .python_packages
        run: |
          set -e
          python -m pip install --upgrade pip wheel
          mkdir -p .python_packages/lib/site-packages
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Deploy to Azure Functions (publish profile)
        uses: Azure/functions-action@v1.5.1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: "."
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
          # Pre-built .python_packages above; avoid extra Kudu setting churn with publish profile
          scm-do-build-during-deployment: false
          enable-oryx-build: false
