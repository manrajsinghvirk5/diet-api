# Deploy: small source zip + async Kudu ZipDeploy + poll. Dependencies are built on Azure (Oryx),
# because ~30MB+ vendored .python_packages reliably hits SCM 502 on ZipDeploy for this app.
#
# Secret: AZURE_FUNCTIONAPP_PUBLISH_PROFILE = full <publishData>...</publishData>
# Portal: SCM Basic Auth Publishing Credentials = On, then re-download publish profile.
# Portal → Configuration → Application settings (required once):
#   SCM_DO_BUILD_DURING_DEPLOYMENT = 1
#   ENABLE_ORYX_BUILD = 1

name: Deploy Python API to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-functions-deploy
  cancel-in-progress: true

env:
  AZURE_FUNCTIONAPP_NAME: diet-api
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify layout and syntax
        run: |
          set -euo pipefail
          test -f host.json || { echo "::error::host.json missing at repo root"; exit 1; }
          test -f function_app.py || { echo "::error::function_app.py missing"; exit 1; }
          python -m compileall -q function_app.py shared

      - name: Remote build (Oryx) note
        run: |
          set -euo pipefail
          test -f requirements.txt || { echo "::error::requirements.txt missing (needed for Oryx remote build)"; exit 1; }
          echo "::notice::Function App must have SCM_DO_BUILD_DURING_DEPLOYMENT=1 and ENABLE_ORYX_BUILD=1 so Azure runs pip during deploy. Omitting vendored .python_packages keeps ZipDeploy under SCM limits."

      - name: Create deployment zip
        run: |
          set -euo pipefail
          rm -f /tmp/functionapp.zip
          zip -rq /tmp/functionapp.zip . \
            -x '.git/*' \
            -x '.github/*' \
            -x '*__pycache__*' \
            -x '*.pyc' \
            -x '.venv/*' \
            -x 'venv/*' \
            -x '.python_packages/*' \
            -x 'local.settings.json' \
            -x '__blobstorage__/*' \
            -x '__queuestorage__/*' \
            -x '__azurite_db*'
          echo "Zip size (bytes):" && wc -c </tmp/functionapp.zip

      - name: ZipDeploy to Kudu (publish profile)
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          ZIP_PATH: /tmp/functionapp.zip
          KUDU_ZIPDEPLOY_POST_TIMEOUT_SEC: "1800"
          KUDU_ZIPDEPLOY_RETRIES: "6"
          KUDU_ZIPDEPLOY_RETRY_BACKOFF_SEC: "30"
          KUDU_POLL_TIMEOUT_SEC: "1800"
        run: |
          set -euo pipefail
          python3 "${GITHUB_WORKSPACE}/.github/scripts/kudu_zipdeploy.py"
