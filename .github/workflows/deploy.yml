# Deploy Python Azure Functions (v2) with Azure/functions-action + publish profile.
#
# GitHub secret: AZURE_FUNCTIONAPP_PUBLISH_PROFILE = full <publishData>...</publishData> XML
# Portal: Function App -> Configuration -> General settings ->
#   "SCM Basic Auth Publishing Credentials" = On
#
# Set AZURE_FUNCTIONAPP_NAME below to the exact app name in Azure (Overview).

name: Deploy Python API to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-functions-deploy
  cancel-in-progress: true

env:
  AZURE_FUNCTIONAPP_NAME: diet-api
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify layout and syntax
        run: |
          set -euo pipefail
          test -f host.json || { echo "::error::host.json missing at repo root"; exit 1; }
          test -f function_app.py || { echo "::error::function_app.py missing"; exit 1; }
          python -m compileall -q function_app.py shared

      - name: Install dependencies into .python_packages
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip wheel
          mkdir -p .python_packages/lib/site-packages
          PIP_DISABLE_PIP_VERSION_CHECK=1 \
            pip install --no-cache-dir -r requirements.txt \
            --target=".python_packages/lib/site-packages"

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1.5.1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: "."
          sku: 'flexconsumption'
          remote-build: true
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
