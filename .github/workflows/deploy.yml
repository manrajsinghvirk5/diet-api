name: Deploy Python API to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Zip for Deployment
        run: zip -r release.zip . -x "*.git*"

      - name: The Ultimate Bypass — Direct cURL ZipDeploy
        # We bypass all actions and upload directly to the Kudu API using the credentials you provided
        run: |
          curl -v -f -X POST \
            -u '$diet-api:NKFMwdMLjJjn3dtEJnaKaQ0gRn1uPbe4vXqCuYf2ibkw9sd1kHkkzaDy4f9l' \
            --data-binary @"release.zip" \
            "https://diet-api-hfegcjavhcamckcc.scm.canadacentral-01.azurewebsites.net/api/zipdeploy"