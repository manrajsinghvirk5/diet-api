# Deploy with publish profile only: POST the zip to the ZipDeploy URL from the profile XML.
# Skips azure/webapps-deploy and Azure/functions-action (runtime OS / 404 / invalid sku+remote-build issues).
#
# Secret: AZURE_FUNCTIONAPP_PUBLISH_PROFILE = full <publishData>...</publishData>
# Portal: SCM Basic Auth Publishing Credentials = On, then re-download the publish profile.

name: Deploy Python API to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-functions-deploy
  cancel-in-progress: true

env:
  AZURE_FUNCTIONAPP_NAME: diet-api
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify layout and syntax
        run: |
          set -euo pipefail
          test -f host.json || { echo "::error::host.json missing at repo root"; exit 1; }
          test -f function_app.py || { echo "::error::function_app.py missing"; exit 1; }
          python -m compileall -q function_app.py shared

      - name: Install dependencies into .python_packages
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip wheel
          mkdir -p .python_packages/lib/site-packages
          PIP_DISABLE_PIP_VERSION_CHECK=1 \
            pip install --no-cache-dir -r requirements.txt \
            --target=".python_packages/lib/site-packages"

      - name: Create deployment zip
        run: |
          set -euo pipefail
          rm -f /tmp/functionapp.zip
          zip -rq /tmp/functionapp.zip . \
            -x '.git/*' \
            -x '.github/*' \
            -x '*__pycache__*' \
            -x '*.pyc' \
            -x '.venv/*' \
            -x 'venv/*' \
            -x 'local.settings.json' \
            -x '__blobstorage__/*' \
            -x '__queuestorage__/*' \
            -x '__azurite_db*'
          echo "Zip size (bytes):" && wc -c </tmp/functionapp.zip

      - name: ZipDeploy to Kudu (from publish profile XML)
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          set -euo pipefail
          python3 << 'PY'
          import base64
          import os
          import ssl
          import urllib.error
          import urllib.request
          import xml.etree.ElementTree as ET

          xml = os.environ.get("PUBLISH_PROFILE", "").strip()
          if not xml:
              raise SystemExit("AZURE_FUNCTIONAPP_PUBLISH_PROFILE is empty")

          root = ET.fromstring(xml)
          profiles = root.findall("publishProfile")
          zp = next((p for p in profiles if p.get("publishMethod") == "ZipDeploy"), None)
          if zp is None:
              raise SystemExit("No publishProfile with publishMethod=ZipDeploy in publishData")

          host = (zp.get("publishUrl") or "").replace(":443", "").strip()
          user = zp.get("userName") or ""
          pwd = zp.get("userPWD") or ""
          if not host or not user or not pwd:
              raise SystemExit("ZipDeploy profile missing publishUrl, userName, or userPWD")

          url = f"https://{host}/api/zipdeploy"
          print("ZipDeploy URL:", url)
          print("SCM user:", user)

          with open("/tmp/functionapp.zip", "rb") as f:
              body = f.read()

          req = urllib.request.Request(url, data=body, method="POST")
          token = base64.b64encode(f"{user}:{pwd}".encode()).decode()
          req.add_header("Authorization", f"Basic {token}")
          req.add_header("Content-Type", "application/zip")

          ctx = ssl.create_default_context()
          try:
              with urllib.request.urlopen(req, context=ctx, timeout=900) as resp:
                  print("HTTP", resp.status)
                  data = resp.read(8000)
                  if data:
                      print(data[:2000])
          except urllib.error.HTTPError as e:
              print("HTTPError", e.code, e.reason)
              err = e.read() or b""
              print(err[:4000].decode(errors="replace"))
              raise
          PY
