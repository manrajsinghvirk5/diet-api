name: Deploy container to Azure Functions App

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - name: Deploy to Azure Function App
      uses: azure/functions-action@v1
      with:
        app-name: diet-api
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
